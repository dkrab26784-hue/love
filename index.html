<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ง้อเปา 💓 จากไกด์</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ffe0f0, #ffc2d1, #ffb6c1);
      overflow: hidden;
      height: 100vh;
      margin: 0;
      font-family: "Prompt", sans-serif;
    }
    .falling-text {
      position: absolute;
      font-size: 28px; /* ใหญ่ขึ้น */
      font-weight: bold;
      color: #ff3f6f;
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 12px 22px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: fall 10s linear forwards; /* ไหลช้าลง */
      text-align: center;
      min-width: 160px;
    }
    @keyframes fall {
      0% { transform: translateY(-50px); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    .buttons {
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }
    .btn {
      padding: 30px 60px; /* ปุ่มใหญ่ขึ้น */
      margin: 15px;
      border: none;
      border-radius: 25px;
      font-size: 26px;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
    }
    .btn-yes {
      background: #ff6f91;
      box-shadow: 0 0 25px #ff6f91;
    }
    .btn-no {
      background: #555;
      box-shadow: 0 0 25px #333;
    }
    .confetti {
      position: fixed;
      width: 14px;
      height: 14px;
      background-color: red;
      animation: confetti-fall 3s linear forwards; /* confetti ไหลช้าลง */
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="buttons">
    <button id="yesBtn" class="btn btn-yes" onclick="agree()">คืนดี 💖</button>
    <button id="noBtn" class="btn btn-no" onclick="disagree()">ไม่คืนดี 😢</button>
  </div>

  <script>
    const messages = [
      "เค้าขอโทษนะ 💕",
      "อย่าโกรธเค้าเลยนะ 🌹",
      "คืนดีกันนะ 💖",
      "รักที่สุดเลย 💘",
      "งอนเค้าได้แต่ห้ามไปไหนนะ 🌸",
      "อยู่ด้วยกันตลอดไปนะ 💞",
      "คือความสุขของเค้า 🌈",
      "เค้าสัญญาจะดูแลเสมอ 🤍",
      "รักที่สุดในโลก 🌎❤️",
      "คือคนสำคัญที่สุด 💓"
    ];

    function createFallingText() {
      const text = document.createElement("div");
      text.className = "falling-text";
      text.innerText = messages[Math.floor(Math.random() * messages.length)];
      text.style.left = Math.random() * (window.innerWidth - 160) + "px";
      document.body.appendChild(text);

      setTimeout(() => {
        text.remove();
      }, 10000); // อยู่บนจอนานขึ้น
    }

    setInterval(createFallingText, 1500); // ข้อความตกลงมาช้าลง

    function agree() {
      Swal.fire({
        title: "🎉 ดีใจที่สุดเลย 💖",
        html: `
          <h2 style="color:#ff3f6f; font-size:32px; margin-bottom:10px;">
            ไกด์รักเปาที่สุ้ดดดดด 💖
          </h2>
          <p style="color:#ff6f91; font-size:24px;">
            อยู่ด้วยกันตลอดไปนะ 💞
          </p>
        `,
        background: "linear-gradient(135deg, #ffe0f0, #ffc2d1, #ff9a9e)",
        color: "#333",
        icon: "success",
        confirmButtonText: "รักนะ 💕",
        confirmButtonColor: "#ff3f6f"
      });

      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = Math.random() * window.innerHeight + "px";
        confetti.style.backgroundColor = randomColor();
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    function randomColor() {
      const colors = ["#ff6f91", "#ff3f6f", "#ffc2d1", "#ffe0f0", "#f9a825", "#4caf50", "#2196f3"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function disagree() {
      const yesBtn = document.getElementById("yesBtn");
      let currentSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
      let currentPadding = parseInt(window.getComputedStyle(yesBtn).padding);

      yesBtn.style.fontSize = (currentSize + 20) + "px";
      yesBtn.style.padding = (currentPadding + 15) + "px " + (currentPadding + 40) + "px";

      if (currentSize > 60) {
        document.getElementById("noBtn").style.display = "none";
        yesBtn.style.position = "fixed";
        yesBtn.style.top = "50%";
        yesBtn.style.left = "50%";
        yesBtn.style.transform = "translate(-50%, -50%)";
        yesBtn.style.width = "90%";
        yesBtn.style.height = "50%";
      }
    }
  </script>
</body>
</html>
